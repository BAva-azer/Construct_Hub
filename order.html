<!DOCTYPE html>
<html>
<head>
  <title>My Orders - PCL Construct Hub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="container">
      <div>
        <a href="javascript:history.back()" style="font-size: 18px; margin-right: 15px;">&lt;- Back</a>
        <a href="index.html">PCL Construct Hub</a>
      </div>
      <div>
        <a href="products_cart.html">Products</a> |
        <a href="orders.html">My Orders</a> |
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>My Orders</h2>
      <div id="orders"></div>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) {
      alert("Please log in first.");
      window.location = "login.html";
    }

    async function loadOrders() {
      const res = await fetch(`http://localhost:5000/user/orders?user_id=${user.id}`);
      const orders = await res.json();

      if (orders.error) {
        document.getElementById("orders").innerHTML = "<p>Error loading orders.</p>";
        return;
      }

      document.getElementById("orders").innerHTML = orders.length > 0
        ? orders.map(order => {
            let cartItems = "";
            let orderTotal = 0;
            try {
              const cart = JSON.parse(order.cart);
              cartItems = Array.isArray(cart) 
                ? cart.map(item => {
                    const quantity = item.quantity || 1;
                    const itemTotal = item.price * quantity;
                    orderTotal += itemTotal;
                    return `<div style="margin: 5px 0;">• ${item.name} - ₹${item.price} × ${quantity} = ₹${itemTotal}</div>`;
                  }).join("")
                : order.cart;
            } catch (e) {
              cartItems = order.cart;
            }
            
            return `
            <div class="card" style="margin: 10px 0;">
              <h3>Order #${order.id}</h3>
              <p><strong>Items:</strong><div style="margin-left: 10px;">${cartItems}</div></p>
              ${orderTotal > 0 ? `<p><strong>Total: ₹${orderTotal}</strong></p>` : ''}
              <p><strong>Address:</strong> ${order.address}</p>
              <p><strong>Status:</strong> <span style="color: ${order.status === 'shipped' ? 'green' : order.status === 'rejected' ? 'red' : 'orange'};">${order.status}</span></p>
            </div>
          `;
          }).join("")
        : "<p>You have no orders yet.</p>";
    }

    function logout() {
      localStorage.removeItem("user");
      window.location = "login.html";
    }

    loadOrders();
  </script>
</body>
</html>
