<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Construct Hub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="container">
      <div>
        <a href="javascript:history.back()" style="font-size: 18px; margin-right: 15px;">&lt;- Back</a>
        <a href="index.html">Construct Hub</a>
      </div>
      <div>
        <a href="products_cart.html">Products</a> |
        <a href="orders.html">My Orders</a> |
        <a href="checkout_payment.html">Checkout</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Checkout</h2>
      <div id="cartSummary"></div>
    </div>

    <div class="card">
      <h2>Shipping Address</h2>
      <form id="checkoutForm">
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" required>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Payment Information</h2>
      <form id="paymentForm">
        <div class="form-group">
          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required>
        </div>
        <div style="display: flex; gap: 10px;">
          <div class="form-group" style="flex: 1;">
            <label for="expiry">Expiry Date</label>
            <input type="text" id="expiry" placeholder="MM/YY" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" placeholder="123" required>
          </div>
        </div>
        <div class="form-group">
          <label for="cardName">Name on Card</label>
          <input type="text" id="cardName" required>
        </div>
        <button type="submit" id="payButton">Pay Now</button>
      </form>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    const cart = JSON.parse(localStorage.getItem("cart") || "[]");
    const cartSummary = document.getElementById("cartSummary");
    const paymentForm = document.getElementById("paymentForm");
    const payButton = document.getElementById("payButton");

    if (!user) {
      alert("Please log in first.");
      window.location = "login.html";
    }

    let cartTotal = 0;
    cartSummary.innerHTML =
      cart.length > 0
        ? cart.map(item => {
            const itemTotal = item.price * (item.quantity || 1);
            cartTotal += itemTotal;
            return `<div class="cart-item" style="display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd;">
              <span><strong>${item.name}</strong> - ₹${item.price} × ${item.quantity || 1}</span>
              <span>₹${itemTotal}</span>
            </div>`;
          }).join("") + `<div style="font-weight: bold; padding: 10px; text-align: right; font-size: 18px;">Total: ₹${cartTotal}</div>`
        : "<p>Your cart is empty.</p>";

    paymentForm.onsubmit = async (e) => {
      e.preventDefault();

      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      // Simulate payment processing
      payButton.disabled = true;
      payButton.textContent = "Processing...";

      setTimeout(async () => {
        // Simulate payment success
        alert("Payment successful! Processing your order...");

        const res = await fetch("http://localhost:5000/order", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            user: user,
            cart: JSON.stringify(cart),
            address: document.getElementById("address").value,
            payment: {
              cardNumber: document.getElementById("cardNumber").value,
              expiry: document.getElementById("expiry").value,
              cvv: document.getElementById("cvv").value,
              cardName: document.getElementById("cardName").value
            }
          })
        });

        alert(await res.text());
        localStorage.removeItem("cart");
        window.location = "products_cart.html";
      }, 2000); // Simulate 2 second processing
    };
  </script>
</body>
</html>
